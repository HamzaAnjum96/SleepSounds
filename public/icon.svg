<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sky" cx="38%" cy="30%" r="85%">
      <stop offset="0%"  stop-color="#15264f"/>
      <stop offset="55%" stop-color="#0b1430"/>
      <stop offset="100%" stop-color="#070b18"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#d9bd80" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#d9bd80" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d9bd80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moon" x1="0.25" y1="0.1" x2="0.8" y2="0.95">
      <stop offset="0%"  stop-color="#f4ead0"/>
      <stop offset="55%" stop-color="#dcc189"/>
      <stop offset="100%" stop-color="#b6924f"/>
    </linearGradient>
    <!-- Mask that carves the crescent: white reveals, black hides -->
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="296" cy="232" r="116" fill="white"/>
      <circle cx="350" cy="196" r="104" fill="black"/>
    </mask>
  </defs>

  <!-- Full-bleed night sky (fills the maskable square) -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Stars, kept inside the maskable safe zone -->
  <g fill="#ffffff">
    <circle cx="150" cy="150" r="3.4" opacity="0.85"/>
    <circle cx="210" cy="108" r="2.2" opacity="0.6"/>
    <circle cx="118" cy="250" r="2.0" opacity="0.55"/>
    <circle cx="370" cy="356" r="2.6" opacity="0.7"/>
    <circle cx="300" cy="392" r="2.0" opacity="0.5"/>
    <circle cx="404" cy="286" r="2.2" opacity="0.6"/>
    <circle cx="168" cy="372" r="2.0" opacity="0.5"/>
  </g>

  <!-- Moon glow + crescent -->
  <circle cx="300" cy="232" r="170" fill="url(#halo)"/>
  <rect width="512" height="512" fill="url(#moon)" mask="url(#crescent)"/>
</svg>
