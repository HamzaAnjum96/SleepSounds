<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080c14" />
    <meta name="description" content="drift away: a calm sleep-sound mixer. Blend rain, fire, ocean, wind, and more, all generated in your browser. Set a wind-down timer and let the night settle." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="drift away" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>drift away — sleep sounds</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,200,0,0" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capture the install prompt as early as possible: Chrome fires
      // beforeinstallprompt before React mounts, and only shows its own
      // banner once. We stash the event so the in-app install button can
      // trigger it any time the app is installable.
      window.__driftInstall = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__driftInstall = e;
        window.dispatchEvent(new Event('drift-installable'));
      });
      window.addEventListener('appinstalled', function () {
        window.__driftInstall = null;
        window.dispatchEvent(new Event('drift-installed'));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
