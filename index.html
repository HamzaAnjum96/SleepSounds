<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Flag Samsung Internet before first paint: it darkens/recolours pages
         and renders backdrop-filter and masks differently, so a few scoped CSS
         overrides keep the night palette from being crushed. Chrome is never
         flagged, so its rendering is untouched. -->
    <script>try{if(/SamsungBrowser/i.test(navigator.userAgent))document.documentElement.classList.add('samsung-browser');}catch(e){}</script>
    <!-- interactive-widget: the Android keyboard resizes the page, so the
         mix-naming field in the bottom sheet is never hidden behind it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Browser chrome (tab bar / address bar) melts into the night canvas. -->
    <meta name="theme-color" content="#080c14" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="drift away: a calm sleep-sound mixer. Blend rain, fire, ocean, wind, and more, all generated in your browser. Set a wind-down timer and let the night settle." />
    <meta name="application-name" content="drift away" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="drift away" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <!-- The app is already a tuned dark theme; don't let Dark Reader re-invert it. -->
    <meta name="darkreader-lock" />
    <!-- Impact (impact.com) site-ownership verification. -->
    <meta name="impact-site-verification" value="574c0cfc-c400-465a-8c27-d2e1aeff5102" />

    <!-- Social cards. og-card.jpg is a generated 1200x630 night scene (the
         app's starfield, moon, and Cormorant wordmark) rendered by
         scripts in-repo — like everything here, generated, not borrowed.
         Absolute URLs: WhatsApp and most scrapers require them. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="drift away" />
    <meta property="og:title" content="drift away — sleep sounds" />
    <meta property="og:description" content="A calm sleep-sound mixer. Rain, fire, ocean, a cat's purr and more — 21 sounds, all generated in your browser. Free, offline, no tracking. Set a wind-down timer and let the night settle." />
    <meta property="og:url" content="https://hamzaanjum96.github.io/SleepSounds/" />
    <meta property="og:image" content="https://hamzaanjum96.github.io/SleepSounds/og-card.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="drift away — a full moon over a starry night sky, above the words: sleep sounds, generated in your browser" />
    <meta property="og:locale" content="en" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="drift away — sleep sounds" />
    <meta name="twitter:description" content="A calm sleep-sound mixer — 21 sounds, all generated in your browser. Free, offline, no tracking." />
    <meta name="twitter:image" content="https://hamzaanjum96.github.io/SleepSounds/og-card.jpg" />
    <meta name="twitter:image:alt" content="drift away — a full moon over a starry night sky, above the words: sleep sounds, generated in your browser" />

    <!-- Structured data: one WebApplication entity for search engines and
         AI readers. Kept in sync by hand with the meta description above. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "drift away",
      "alternateName": "drift away — sleep sounds",
      "url": "https://hamzaanjum96.github.io/SleepSounds/",
      "description": "A calm, free sleep-sound mixer. 21 ambient sounds — rain, fire, ocean, wind, thunder, a cat's purr, wind chimes and more — all synthesized in the browser at runtime: no recordings, no streaming, works fully offline as an installable PWA. Layer sounds, fine-tune each one, save mixes, and set a sleep timer with a gentle wind-down.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Any (web browser)",
      "browserRequirements": "Requires a modern browser with Web Audio",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "image": "https://hamzaanjum96.github.io/SleepSounds/og-card.jpg",
      "screenshot": "https://hamzaanjum96.github.io/SleepSounds/screenshots/home.png",
      "featureList": [
        "21 procedurally generated ambient sounds (nothing recorded or streamed)",
        "Layer sounds freely with per-sound volume and character presets",
        "Fine-tune editors for every sound",
        "Ten curated scenes",
        "Sleep timer with gentle wind-down fade",
        "Save and reload mixes",
        "Works fully offline (installable PWA)",
        "No account, no ads, no tracking"
      ]
    }
    </script>
    <title>drift away — sleep sounds</title>
    <link rel="canonical" href="https://hamzaanjum96.github.io/SleepSounds/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Self-hosted fonts and icons: no external requests, so type and icons
         work fully offline (and there are no third-party font calls at all).
         Preload the faces shown immediately; the icon font loads with the
         sheet (font-display:block hides ligature names until it lands). -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/inter-1.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/cormorant-4.woff2" />
    <link rel="stylesheet" href="/fonts.css" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "drift away",
      "url": "https://hamzaanjum96.github.io/SleepSounds/",
      "description": "A calm sleep-sound mixer. Blend rain, fire, ocean, wind and more, all generated in your browser, with a sleep timer that fades the mix out.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript and the Web Audio API",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body>
    <!-- Impact (impact.com) site-ownership verification — the literal text
         segment their crawler looks for, kept in the body but visually hidden so
         it doesn't disturb the app. (The head meta tag above is the same proof.) -->
    <p style="position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0 0 0 0);border:0;">Impact-Site-Verification: 574c0cfc-c400-465a-8c27-d2e1aeff5102</p>
    <div id="root"></div>
    <noscript>
      <div style="font-family: Georgia, serif; font-style: italic; color: #dfe3ed; background: #080c14; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;">
        drift away mixes its sounds in your browser, so it needs JavaScript turned on.
      </div>
    </noscript>
    <script>
      // Capture the install prompt as early as possible: Chrome fires
      // beforeinstallprompt before React mounts, and only shows its own
      // banner once. We stash the event so the in-app install button can
      // trigger it any time the app is installable.
      window.__driftInstall = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__driftInstall = e;
        window.dispatchEvent(new Event('drift-installable'));
      });
      window.addEventListener('appinstalled', function () {
        window.__driftInstall = null;
        window.dispatchEvent(new Event('drift-installed'));
      });
    </script>
    <script>
      // Self-heal: if the app hasn't mounted a short while after load, the
      // cached shell is likely inconsistent (e.g. it references an asset that
      // didn't get cached). When online, clear caches + the service worker once
      // and reload to fetch a clean copy. Guarded by sessionStorage so it can
      // never loop, and never runs offline (that would only make things worse).
      window.addEventListener('load', function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return;
          if (!navigator.onLine || sessionStorage.getItem('drift-healed')) return;
          sessionStorage.setItem('drift-healed', '1');
          var done = function () { location.reload(); };
          var clearCaches = ('caches' in window)
            ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
            : Promise.resolve();
          clearCaches.then(function () {
            if (navigator.serviceWorker) {
              return navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              });
            }
          }).then(done, done);
        }, 6000);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
