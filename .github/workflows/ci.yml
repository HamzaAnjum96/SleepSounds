name: CI

# Quality gate on every push and PR: typecheck, unit tests, and a full build.
# The deploy workflow only publishes from main; this runs everywhere so broken
# changes are caught before they reach GitHub Pages.
on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The hosted runner ships extra apt repos (packages.microsoft.com) that
      # intermittently 403 and break `apt-get update`, which fails the
      # `--with-deps` browser install below. Drop any such repo first so the
      # install depends only on the Ubuntu archives it actually needs.
      - name: Remove flaky third-party apt repos
        run: sudo grep -rl packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -r rm -f || true
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
