name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  # Manual redeploy lever: when the Pages backend rejects a deployment (it
  # happens — "Deployment failed, try again later"), rerun from the Actions
  # tab instead of cutting a release. Always deploys the latest main.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time, and never cancel one mid-flight: a cancelled Pages
# run can leave its server-side deployment dangling, and the next run then
# fails with "Deployment failed, try again later" (bit us on 9.2.0/9.2.1 when
# releases landed minutes apart). Queued > cancelled for production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url || steps.deployment-final.outputs.page_url }}
    steps:
      # The Pages backend intermittently rejects deployments outright
      # ("Deployment failed, try again later"), especially when releases land
      # minutes apart (9.2.0, 9.2.1 and 9.2.4 all hit it). First attempt is
      # allowed to fail; after a pause we deploy once more for real.
      - uses: actions/deploy-pages@v4
        id: deployment
        continue-on-error: true
      - name: Pause before retrying a rejected deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 90
      - uses: actions/deploy-pages@v4
        id: deployment-retry
        continue-on-error: true
        if: steps.deployment.outcome == 'failure'
      # Second retry with a long pause: 9.4.2's deploy was rejected twice in
      # ~90s — backend rejections can outlive a short backoff.
      - name: Long pause before the final attempt
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
        run: sleep 300
      - uses: actions/deploy-pages@v4
        id: deployment-final
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry.outcome == 'failure'
