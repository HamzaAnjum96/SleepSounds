<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="http://localhost:5173/SleepSounds/fonts.css">
<style>
  * { margin: 0; padding: 0; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #080c14; position: relative; }
  /* the app's night canvas: ink base + the aurora's indigo/violet/teal breaths */
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(90% 70% at 78% 22%, rgba(120, 90, 200, 0.10) 0%, transparent 60%),
      radial-gradient(80% 60% at 15% 80%, rgba(60, 120, 160, 0.10) 0%, transparent 60%),
      radial-gradient(70% 55% at 45% 10%, rgba(80, 100, 190, 0.07) 0%, transparent 65%),
      linear-gradient(165deg, #0a0f1c 0%, #080c14 55%, #070a11 100%);
  }
  canvas { position: absolute; inset: 0; }
  .moon {
    position: absolute; top: 92px; right: 128px;
    width: 148px; height: 148px; border-radius: 999px;
    background: radial-gradient(circle at 38% 38%, #f0e8ca 0%, #d4b878 55%, #a88040 100%);
    box-shadow:
      0 0 55px rgba(210,180,110,0.55),
      0 0 130px rgba(200,165,100,0.30),
      0 0 240px rgba(184,154,106,0.14);
    opacity: 0.94;
  }
  .moon::before {
    content: ''; position: absolute; inset: 0; border-radius: 999px;
    background: radial-gradient(circle at 68% 35%, rgba(0,0,0,0.09) 0%, transparent 60%);
  }
  .moon::after {
    content: ''; position: absolute; top: 32px; left: 46px;
    width: 36px; height: 36px; border-radius: 999px;
    background: rgba(140,100,40,0.13);
    box-shadow: 45px 17px 0 28px rgba(140,100,40,0.08), 17px 57px 0 22px rgba(140,100,40,0.07);
  }
  .text {
    position: absolute; left: 96px; bottom: 150px;
  }
  .wordmark {
    font-family: 'Cormorant', serif; font-style: italic; font-weight: 300;
    font-size: 148px; letter-spacing: 0.06em; line-height: 1;
    color: #e6eaf3;
    text-shadow: 0 0 60px rgba(123,167,232,0.25);
  }
  .tagline {
    margin-top: 34px;
    font-family: 'Cormorant', serif; font-style: italic; font-weight: 300;
    font-size: 44px; letter-spacing: 0.03em;
    color: rgba(185, 196, 222, 0.92);
  }
  .horizon {
    position: absolute; left: 96px; right: 96px; bottom: 96px;
    height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02));
  }
</style>
</head>
<body>
  <div class="sky"></div>
  <canvas id="stars" width="1200" height="630"></canvas>
  <div class="moon"></div>
  <div class="text">
    <div class="wordmark">drift away</div>
    <div class="tagline">sleep sounds, generated in your browser</div>
  </div>
  <div class="horizon"></div>
<script>
  // Textured starfield in the app's manner: many faint stars, a few bright
  // ones with glow, gentle blue-warm colour variance, clustered patches.
  const ctx = document.getElementById('stars').getContext('2d');
  let seed = 0x9e3779b9;
  function rnd() {
    seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  // faint dust layer
  for (let i = 0; i < 700; i++) {
    const x = rnd() * 1200, y = rnd() * 630;
    const r = 0.3 + rnd() * 0.8;
    const a = 0.04 + rnd() * 0.12;
    ctx.fillStyle = `rgba(${200 + rnd() * 55 | 0}, ${205 + rnd() * 40 | 0}, ${225 + rnd() * 30 | 0}, ${a})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  }
  // main stars
  for (let i = 0; i < 220; i++) {
    const x = rnd() * 1200, y = rnd() * 630;
    // keep the text zone calm
    if (x > 60 && x < 760 && y > 330 && y < 560 && rnd() < 0.7) continue;
    const r = 0.6 + rnd() * 1.3;
    const warm = rnd() < 0.16;
    const a = 0.25 + rnd() * 0.5;
    ctx.fillStyle = warm
      ? `rgba(240, 224, 190, ${a})`
      : `rgba(${215 + rnd() * 40 | 0}, ${222 + rnd() * 33 | 0}, 255, ${a})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
  }
  // a handful of heroes with glow
  for (let i = 0; i < 14; i++) {
    const x = rnd() * 1200, y = rnd() * 630;
    if (x > 60 && x < 760 && y > 330 && y < 560) continue;
    if (x > 950 && x < 1200 && y > 40 && y < 300) continue; // not on the moon
    const r = 1.2 + rnd() * 1.1;
    ctx.shadowColor = 'rgba(200, 215, 255, 0.9)';
    ctx.shadowBlur = 6 + rnd() * 8;
    ctx.fillStyle = `rgba(235, 240, 255, ${0.7 + rnd() * 0.3})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
  }
</script>
</body>
</html>
